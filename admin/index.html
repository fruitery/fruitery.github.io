<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Fruitery Menu Manager</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#fffaf0;color:#38251c;font:16px/1.6 system-ui,sans-serif}.panel{width:min(560px,100%);padding:40px;border:1px solid #eadfce;border-radius:24px;background:#fff;box-shadow:0 18px 50px #38251c12}h1{margin:0 0 12px;font-size:clamp(32px,7vw,48px)}p{color:#6f625b}.button{display:inline-block;margin-top:12px;padding:14px 22px;border-radius:999px;background:#38251c;color:#fff;text-decoration:none;font-weight:700}.back{display:block;margin-top:24px;color:#617c2d}
  </style>
</head>
<body>
  <main class="panel">
    <p>Fruitery administration</p>
    <h1>Menu Manager</h1>
    <p>Sign in with the <strong>fruitery</strong> GitHub account to add, edit, hide, or remove menu items and upload product photos.</p>
    <a class="button" href="https://app.pagescms.org" rel="external">Open Menu Manager</a>
    <a class="back" href="/">← Return to the website</a>
  </main>

</html>
